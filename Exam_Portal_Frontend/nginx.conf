server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # This makes React Router routes like /exams work:
    location / {
        try_files $uri /index.html;
    }

    # (Optional) If later you want to proxy /api to backend:
    # location /api/ {
    #     proxy_pass http://host.docker.internal:8080;
    # }
}
