# ===============================
# = EMAIL CONFIGURATION (Truerize - Custom Domain)
# ===============================
spring.mail.host=mail.truerize.com
spring.mail.port=465
spring.mail.username=talent@truerize.com
spring.mail.password=Truerize@Truerize$123456789@True
spring.mail.protocol=smtps

# Authentication
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtps.auth=true

# SSL Configuration
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtps.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtps.ssl.trust=*
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# Socket Factory
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false

# Timeouts
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000

# Additional Settings
spring.mail.properties.mail.smtp.sendpartial=true
spring.mail.properties.mail.smtp.quitwait=false

# Debug Mode
spring.mail.properties.mail.debug=true

# ===============================
# = LOGGING
# ===============================
logging.level.com.truerize=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Disable Whitelabel Error Page
server.error.whitelabel.enabled=false

spring.jackson.serialization.indent-output=true
