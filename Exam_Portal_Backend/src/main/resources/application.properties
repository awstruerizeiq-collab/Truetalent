# ===============================
# = DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/exam_portal
spring.datasource.username=root
spring.datasource.password=Dharani@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.session.jdbc.initialize-schema=always
spring.session.jdbc.platform=mysql
server.servlet.session.timeout=60m

# ===============================
# = JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# = SERVER CONFIGURATION
# ===============================
server.port=8081

# ===============================
# = JWT CONFIGURATION
# ===============================
app.jwtSecret=U29tZVN1cGVyU2VjdXJlS2V5MTIzNDU2Nzg5MGFiY2RlZg==
app.jwtExpirationMs=86400000

# ===============================
# = STATIC FILE SERVING
# ===============================
spring.web.resources.static-locations=file:uploads/,classpath:/static/

# ===============================
# = FILE UPLOAD CONFIGURATION
# ===============================
file.upload-dir=uploads/videos
spring.servlet.multipart.max-file-size=1000MB
spring.servlet.multipart.max-request-size=1000MB
spring.servlet.multipart.enabled=true

# ===============================
# = EMAIL CONFIGURATION (GoDaddy - Optimized)
# ===============================
spring.mail.host=mail.truerize.com
spring.mail.port=465
spring.mail.username=talent@truerize.com
spring.mail.password=Truerize@Truerize$123456789@True
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.test-connection=true

# Authentication
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

# Trust Configuration
spring.mail.properties.mail.smtp.ssl.trust=mail.truerize.com
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false

# SSL Protocols (Added TLSv1.3 support)
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3

# Connection Pool Settings (Important for bulk sending)
spring.mail.properties.mail.smtp.pool=true
spring.mail.properties.mail.smtp.pool.size=8

# Timeouts (Increased for stability)
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.connectiontimeout=20000
spring.mail.properties.mail.smtp.writetimeout=30000

# Additional Settings
spring.mail.properties.mail.smtp.sendpartial=false
spring.mail.properties.mail.smtp.quitwait=false
spring.mail.properties.mail.smtp.localhost=truerize.com

# Debug Mode (Disable in production)
spring.mail.properties.mail.debug=false
app.mail.from=${spring.mail.username}

# ===============================
# = ASYNC CONFIGURATION (for Bulk Emails)
# ===============================
app.mail.executor.core-pool-size=8
app.mail.executor.max-pool-size=16
app.mail.executor.queue-capacity=10000
app.mail.executor.keep-alive-seconds=60
app.mail.executor.await-termination-seconds=300


# Bulk email tuning for large assignment runs
# Expected range depends on SMTP response time, mailbox provider behavior, and retries.
app.mail.bulk.batch-size=50
app.mail.bulk.delay-between-emails-ms=100
app.mail.bulk.delay-between-batches-ms=500
app.mail.bulk.max-retries=3
app.mail.bulk.retry-delay-ms=1000


# ===============================
# = JACKSON JSON CONFIGURATION
# \uD83D\uDD25 CRITICAL FIX FOR LOCALDATE/LOCALTIME SERIALIZATION
# ===============================
# Serialize dates as strings like "2025-12-22" instead of arrays [2025, 12, 22]
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# Enable JavaTimeModule for LocalDate, LocalTime, LocalDateTime support
spring.jackson.serialization.WRITE_DATES_WITH_ZONE_ID=false
spring.jackson.deserialization.ADJUST_DATES_TO_CONTEXT_TIME_ZONE=false

# JSON formatting (already present but good to keep)
spring.jackson.serialization.indent-output=true

# ===============================
# = LOGGING
# ===============================
logging.level.com.truerize=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.mail=INFO
logging.level.org.hibernate.SQL=DEBUG

# Disable Whitelabel Error Page
server.error.whitelabel.enabled=false
