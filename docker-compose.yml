

version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: exam-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Nesan@123
      MYSQL_DATABASE: exam_portal
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - exam-network

  backend:
    build:
      context: ./Exam_Portal_Backend
    container_name: exam-backend
    restart: always
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/exam_portal
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Nesan@123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    networks:
      - exam-network

  frontend:
    build:
      context: ./Exam_Portal_Frontend
    container_name: exam-frontend
    restart: always
    depends_on:
      - backend
    # ports:
    #   - "3000:80"
    environment:
      REACT_APP_API_BASE_URL: /api
    networks:
      - exam-network

  nginx:
    image: nginx:latest
    container_name: exam-nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - exam-network

volumes:
  mysql_data:

networks:
  exam-network:
    driver: bridge