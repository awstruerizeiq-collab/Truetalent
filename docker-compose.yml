version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: exam-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Nesan@123
      MYSQL_DATABASE: exam_portal
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./Exam_Portal_Backend
    container_name: exam-backend
    restart: always
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/exam_portal
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Nesan@123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./Exam_Portal_Frontend
    container_name: exam-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      # Not used at runtime but for clarity
      REACT_APP_API_BASE_URL: http://backend:8080/api

volumes:
  mysql_data:
