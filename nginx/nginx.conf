worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstream definitions (Docker service names from docker-compose)
    upstream frontend {
        server frontend:80;
    }

    upstream backend {
        server backend:8080;
    }

    ########################################################
    # 1. Root domain → redirect to app.truerizetalent.com
    ########################################################

    # HTTP for root + www → redirect to HTTPS app
    server {
        listen 80;
        listen [::]:80;
        server_name truerizetalent.com www.truerizetalent.com;

        return 301 https://app.truerizetalent.com$request_uri;
    }

    # HTTPS for root + www → redirect to HTTPS app
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name truerizetalent.com www.truerizetalent.com;

        # SSL cert for truerizetalent.com + www
        ssl_certificate     /etc/nginx/ssl/truerizetalent.fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/truerizetalent.privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        return 301 https://app.truerizetalent.com$request_uri;
    }

    ########################################################
    # 2. app.truerizetalent.com → FRONTEND + /api → BACKEND
    ########################################################

    # HTTP → redirect to HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name app.truerizetalent.com;

        return 301 https://$host$request_uri;
    }

    # HTTPS app
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name app.truerizetalent.com;

        # Cert that includes app.truerizetalent.com (and api.truerizetalent.com)
        ssl_certificate     /etc/nginx/ssl/app_api.fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/app_api.privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 🔹 API under app.truerizetalent.com → backend
        # e.g. https://app.truerizetalent.com/api/auth/logout
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_redirect off;
        }

        # 🔹 Everything else → frontend (React) via Docker service `frontend`
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_redirect off;
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
        }
    }

    ########################################################
    # 3. api.truerizetalent.com → BACKEND (direct)
    ########################################################

    # HTTP → redirect to HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name api.truerizetalent.com;

        return 301 https://$host$request_uri;
    }

    # HTTPS API
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name api.truerizetalent.com;

        # Using same cert (SAN includes api.truerizetalent.com)
        ssl_certificate     /etc/nginx/ssl/app_api.fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/app_api.privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Backend API – keeps path as-is (/api/auth/logout, etc.)
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_redirect off;
        }
    }
}
